name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - run: flutter pub get

      - name: Build
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          $src = "build/windows/x64/runner/Release"
          $dest = "MarkFlow_${ver}_windows_x64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: MarkFlow_*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter pub get

      - run: flutter build linux --release

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          # 找到构建产物目录（包含二进制文件）
          release_dir=$(find build/linux -type d -name "release" 2>/dev/null | head -n 1)
          if [ -z "$release_dir" ]; then
            echo "Build output not found. Listing build/linux:"
            find build/linux -maxdepth 5 -type d 2>/dev/null
            exit 1
          fi
          echo "Found release dir: $release_dir"
          ls -la "$release_dir"
          cd "$release_dir"
          tar czf "../../../../MarkFlow_${ver}_linux_x64.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: MarkFlow_*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build macos --release

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          # 找到 .app 包
          app=$(find build/macos -type d -name "*.app" 2>/dev/null | head -n 1)
          if [ -z "$app" ]; then
            echo "App bundle not found. Listing build/macos:"
            find build/macos -maxdepth 5 -type d 2>/dev/null
            exit 1
          fi
          echo "Found app bundle: $app"
          cd "$(dirname "$app")"
          app_name=$(basename "$app")
          zip -r "../../../../MarkFlow_${ver}_macos.zip" "$app_name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: MarkFlow_*.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          title="MarkFlow ${tag}"

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --generate-notes \
            artifacts/**/*
